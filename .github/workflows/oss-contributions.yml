name: Update OSS Contributions

on:
  schedule:
    - cron: "23 */12 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/scripts/update-oss-contributions.js"
      - ".github/workflows/oss-contributions.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update contribution stars
        run: node .github/scripts/update-oss-contributions.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit README updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update OSS contribution stats [skip ci]"
          file_pattern: README.md
